<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>世界杯概率预测 · World Cup Probability</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="bg-grad"></div>

<header class="topbar">
  <div class="brand">
    <span class="logo">🏆</span>
    <span class="brand-txt"><b>世界杯概率预测</b><small>World Cup Probability · 2026</small></span>
  </div>
  <nav class="topnav" id="topnav"></nav>
  <div class="topright">
    <span class="chip" id="asof-chip">—</span>
    <span class="chip live" id="live-chip"></span>
  </div>
</header>

<div class="shell">
  <aside class="sidebar">
    <nav class="sidenav" id="sidenav"></nav>
    <div class="side-card">
      <div class="sc-title">预测说明</div>
      <p>基于 Elo 评分、球队状态、阵容市值、历史数据、博彩赔率等多维数据，Dixon-Coles 双泊松 + 5 万次蒙特卡洛模拟。基准是<b>对标赔率的概率校准（RPS）</b>，不是「猜中率」。</p>
    </div>
    <div class="side-card">
      <div class="sc-title">数据更新</div>
      <div id="side-update" class="sc-update">—</div>
    </div>
    <div class="side-trophy">🏆</div>
  </aside>

  <main id="main"></main>
</div>

<footer class="foot">
  <div id="foot-line">世界杯概率预测引擎 · martj42 国际比赛史 · Transfermarkt · the-odds-api 实时赔率 · FiveThirtyEight</div>
  <div class="dim">模型已知局限：点球大战按 50/50；国家队样本稀疏，单场预测上限有限——看概率校准，别看单场命中。下注有风险，本页仅供研究/教育。</div>
</footer>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
